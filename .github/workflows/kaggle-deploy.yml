name: Deploy notebook to Kaggle

# Pushes notebooks/kaggle_train.ipynb to your Kaggle kernel whenever the
# notebook (or the push script itself) changes on main, so Kaggle always
# has the latest code path. Does NOT auto-trigger a run by default —
# `kaggle kernels push` does queue a new run when called, but we want
# explicit control over GPU spend, so we use --no-run via a flag. To run
# manually, use the workflow_dispatch trigger with run=true, or run
# `bash scripts/kaggle_run.sh` from your laptop.
#
# Required GitHub secrets:
#   KAGGLE_USERNAME — your Kaggle username
#   KAGGLE_KEY      — API key from Kaggle Account → Create New API Token
#                     (the "key" field of the downloaded kaggle.json)
#
# Optional repository variables:
#   KAGGLE_KERNEL_SLUG       (default: pipette-well-training)
#   KAGGLE_DATA_SLUG         (default: pipette-well-dataset)
#   KAGGLE_CHECKPOINT_SLUG   (default: pipette-well-checkpoint;
#                             empty string disables resume on Kaggle)

# NOTE: This workflow is manual-trigger only.
#
# `kaggle kernels push` does not preserve the kernel's accelerator type
# (the SaveKernel API only has enable_gpu=true/false; the actual GPU type
# defaults to whatever Kaggle assigns for the account, which can be P100).
# Auto-pushing on every notebook commit would silently reset T4 → P100
# repeatedly. The notebook git-pulls fresh code at runtime anyway, so
# code changes don't require a re-push to flow into Kaggle.
#
# Use this workflow only when you actually want to update the kernel
# metadata (cells reordered, dataset attachments changed, etc.). After
# it runs, re-select T4 in the Kaggle UI before triggering a run.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you re-pushing the kernel? (logged in summary)'
        required: false
        default: 'metadata or notebook structure change'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install --quiet kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -z "$KAGGLE_USERNAME" ] || [ -z "$KAGGLE_KEY" ]; then
            echo "::error::KAGGLE_USERNAME and KAGGLE_KEY repository secrets are required."
            echo "Set them at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}\n' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Push notebook to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KERNEL_SLUG: ${{ vars.KAGGLE_KERNEL_SLUG || 'pipette-well-training' }}
          KAGGLE_DATA_SLUG: ${{ vars.KAGGLE_DATA_SLUG || 'pipette-well-dataset' }}
          KAGGLE_CHECKPOINT_SLUG: ${{ vars.KAGGLE_CHECKPOINT_SLUG || 'pipette-well-checkpoint' }}
        run: bash scripts/kaggle_push_notebook.sh

      - name: Summary
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KERNEL_SLUG: ${{ vars.KAGGLE_KERNEL_SLUG || 'pipette-well-training' }}
          REASON: ${{ inputs.reason }}
        run: |
          {
            echo "### Kaggle kernel updated"
            echo ""
            echo "Reason: $REASON"
            echo ""
            echo "[Open kernel on Kaggle](https://www.kaggle.com/code/${KAGGLE_USERNAME}/${KAGGLE_KERNEL_SLUG})"
            echo ""
            echo "**Important**: this push reset the accelerator to your Kaggle account"
            echo "default. Re-select **GPU T4 x2** in the Kaggle UI before running."
          } >> "$GITHUB_STEP_SUMMARY"
